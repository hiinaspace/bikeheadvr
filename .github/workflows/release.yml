name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --group build

      - name: Run smoke import check
        run: uv run python scripts/smoke_import.py

      - name: Run unit tests
        run: uv run pytest -q

      - name: Build PyInstaller executable
        run: uv run pyinstaller --noconfirm bikeheadvr.spec

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: bikeheadvr-windows
          path: dist/bikeheadvr.exe
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = "dist/bikeheadvr.exe"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --generate-notes --title $tag
          }
